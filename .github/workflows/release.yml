name: Publish release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag or version name, for example v00.01.00 or v00.01.00-rc1"
        required: true
        type: string

# ── Environment ──────────────────────────────────────────────────────────────
# These are used across jobs and should be bumped together.
env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Version extraction ────────────────────────────────────────────────────
  get-version:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.set-version.outputs.VERSION }}
      VERSION_NAME: ${{ steps.set-version.outputs.VERSION_NAME }}
      IS_PRERELEASE: ${{ steps.set-version.outputs.IS_PRERELEASE }}
    steps:
      - name: Set version
        id: set-version
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.release_tag }}"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          fi

          # Strip leading "v"
          TAG_NAME="${TAG_NAME#v}"

          echo "VERSION=$(echo "$TAG_NAME" | sed 's/-rc.*//')" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=$TAG_NAME" >> $GITHUB_OUTPUT

          if echo "$TAG_NAME" | grep -q -- '-rc'; then
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

  # ── Windows build (x86_64) ────────────────────────────────────────────────
  windows-build:
    needs: get-version
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
      VERSION_NAME: ${{ needs.get-version.outputs.VERSION_NAME }}
      IS_PRERELEASE: ${{ needs.get-version.outputs.IS_PRERELEASE }}
    outputs:
      VERSION: ${{ steps.pass-outputs.outputs.VERSION }}
      VERSION_NAME: ${{ steps.pass-outputs.outputs.VERSION_NAME }}
      IS_PRERELEASE: ${{ steps.pass-outputs.outputs.IS_PRERELEASE }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: x64

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update version in config.py
        shell: pwsh
        run: |
          $path = "app\common\config.py"
          $content = Get-Content $path -Raw
          # Capture and preserve leading whitespace
          $content = $content -replace '(?m)^(\s*)appVersion\s*=\s*".*?"', "`$1appVersion = `"$env:VERSION`""
          [System.IO.File]::WriteAllText($(Resolve-Path $path), $content, $(New-Object System.Text.UTF8Encoding($false)))

      - name: Compile Qt resources
        run: pyside6-rcc app/resources/resources.qrc -o app/resources/resources_rc.py

      - name: Build with Nuitka
        run: python scripts/deploy.py
        timeout-minutes: 120

      - name: Rename executable for installer
        shell: pwsh
        run: |
          Rename-Item -Path "dist\main.dist\main.exe" -NewName "River.exe"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build Installer with Inno Setup
        shell: pwsh
        run: |
          # Replace version placeholder
          (Get-Content River.iss) -replace 'APPLICATION_VERSION', "$env:VERSION" | Set-Content River.iss

          # Download Chinese language files before compiling
          $issLangDir = "C:\Program Files (x86)\Inno Setup 6\Languages"
          Write-Host "Downloading translation files to: $issLangDir"
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl" -OutFile "$issLangDir\ChineseSimplified.isl"
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseTraditional.isl" -OutFile "$issLangDir\ChineseTraditional.isl"

          # Try to find iscc.exe
          $isccPaths = @(
            "C:\Program Files (x86)\Inno Setup 6\iscc.exe",
            "$env:LOCALAPPDATA\Programs\Inno Setup 6\iscc.exe",
            "C:\Program Files\Inno Setup 6\iscc.exe"
          )
          $iscc = $null
          foreach ($p in $isccPaths) {
            if (Test-Path $p) { $iscc = $p; break }
          }
          if (-not $iscc) {
            # Try to find it anywhere
            $iscc = (Get-ChildItem -Path "$env:ProgramFiles", "$env:ProgramFiles(x86)" -Recurse -Filter "iscc.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          }
          if (-not $iscc) { throw "iscc.exe not found" }

          Write-Host "Using iscc: $iscc"
          & $iscc River.iss

      - name: Rename installer
        shell: pwsh
        run: |
          # Find the built installer (output filename from .iss has version placeholder)
          $setupFiles = Get-ChildItem -Path "dist\River-v*.exe" -ErrorAction SilentlyContinue
          if (-not $setupFiles) {
            # Try alternate naming pattern
            $setupFiles = Get-ChildItem -Path "dist\*.exe" -ErrorAction SilentlyContinue | Where-Object { $_.Name -like "*setup*" -or $_.Name -like "*installer*" }
          }
          if ($setupFiles) {
            $setupFile = $setupFiles | Select-Object -First 1
            $newName = "River_$env:VERSION_NAME_windows_x64_setup.exe"
            Write-Host "Renaming '$($setupFile.Name)' -> '$newName'"
            Rename-Item -Path $setupFile.FullName -NewName $newName
          } else {
            Write-Host "No setup exe found in dist/, checking..."
            Get-ChildItem -Path dist -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
          }

      - name: Package portable zip
        run: |
          $distDir = "River_$env:VERSION_NAME_windows_x64"
          Move-Item dist\main.dist $distDir -ErrorAction SilentlyContinue
          if (Test-Path $distDir) {
            Compress-Archive -Path "$distDir\*" -DestinationPath "${distDir}_portable.zip"
          }

      - name: Upload portable zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: River_${{ env.VERSION_NAME }}_windows_x64_portable.zip

      - name: Upload setup artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup-artifact
          path: dist/River_${{ env.VERSION_NAME }}_windows_x64_setup.exe

      # Pass version outputs so publish job can consume them
      - name: Pass outputs
        id: pass-outputs
        shell: pwsh
        run: |
          echo "VERSION=$env:VERSION" >> $env:GITHUB_OUTPUT
          echo "VERSION_NAME=$env:VERSION_NAME" >> $env:GITHUB_OUTPUT
          echo "IS_PRERELEASE=$env:IS_PRERELEASE" >> $env:GITHUB_OUTPUT

  # ── Linux builds (amd64 + arm64) ──────────────────────────────────────────
  linux-build:
    needs: get-version
    strategy:
      matrix:
        include:
          - arch: amd64
            os: ubuntu-latest
            python_arch: x64
          - arch: arm64
            os: ubuntu-24.04-arm
            python_arch: arm64
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
      VERSION_NAME: ${{ needs.get-version.outputs.VERSION_NAME }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: ${{ matrix.python_arch }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libfontconfig1 libdbus-1-3

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Update version in config.py
        run: |
          sed -i 's/^\(\s*\)appVersion\s*=\s*".*"/\1appVersion = "'"$VERSION"'"/' app/common/config.py

      - name: Compile Qt resources
        run: pyside6-rcc app/resources/resources.qrc -o app/resources/resources_rc.py

      - name: Build with Nuitka
        run: python scripts/deploy.py
        timeout-minutes: 120

      - name: Build .deb package (amd64 only)
        if: ${{ matrix.arch == 'amd64' }}
        run: |
          DIST_DIR="dist/main.dist"
          DEB_ROOT="$RUNNER_TEMP/deb-root"
          PACKAGE_NAME="river"
          INSTALL_DIR="/opt/River"

          rm -rf "$DEB_ROOT"
          mkdir -p \
            "$DEB_ROOT/DEBIAN" \
            "$DEB_ROOT$INSTALL_DIR" \
            "$DEB_ROOT/usr/bin" \
            "$DEB_ROOT/usr/share/applications" \
            "$DEB_ROOT/usr/share/icons/hicolor/256x256/apps"

          cp -R "$DIST_DIR"/. "$DEB_ROOT$INSTALL_DIR/"
          chmod +x "$DEB_ROOT$INSTALL_DIR/main.bin"
          ln -s "$INSTALL_DIR/main.bin" "$DEB_ROOT/usr/bin/$PACKAGE_NAME"

          cat > "$DEB_ROOT/DEBIAN/control" <<EOF
          Package: $PACKAGE_NAME
          Version: $VERSION
          Section: net
          Priority: optional
          Architecture: amd64
          Maintainer: kkl <kkl@example.com>
          Description: River - A multi-threading downloader based on PySide6
          Depends: libegl1, libgl1, libxkbcommon-x11-0, libfontconfig1, libdbus-1-3
          EOF

          cat > "$DEB_ROOT/usr/share/applications/river.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=River
          Comment=A multi-threading downloader based on PySide6
          Exec=$PACKAGE_NAME
          Icon=$PACKAGE_NAME
          Terminal=false
          Categories=Network;Utility;
          StartupNotify=false
          EOF

          cp "app/resources/images/logo.png" "$DEB_ROOT/usr/share/icons/hicolor/256x256/apps/$PACKAGE_NAME.png" 2>/dev/null || true

          dpkg-deb --build --root-owner-group "$DEB_ROOT" "dist/River_${VERSION_NAME}_linux_${{ matrix.arch }}.deb"
          echo "DEB_FILE=dist/River_${VERSION_NAME}_linux_${{ matrix.arch }}.deb" >> $GITHUB_ENV

      - name: Upload .deb artifact
        if: ${{ matrix.arch == 'amd64' }}
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-deb
          path: dist/River_${{ env.VERSION_NAME }}_linux_${{ matrix.arch }}.deb

      - name: Package portable tar.gz
        run: |
          mv dist/main.dist "River_${VERSION_NAME}_linux_${{ matrix.arch }}"
          tar -czf "River_${VERSION_NAME}_linux_${{ matrix.arch }}_portable.tar.gz" "River_${VERSION_NAME}_linux_${{ matrix.arch }}"

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-artifact
          path: River_${{ env.VERSION_NAME }}_linux_${{ matrix.arch }}_portable.tar.gz

  # ── macOS builds (x86_64 + aarch64) ───────────────────────────────────────
  macos-build:
    needs: get-version
    strategy:
      matrix:
        include:
          - arch: arm64
            os: macos-latest
            python_arch: arm64
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
      VERSION_NAME: ${{ needs.get-version.outputs.VERSION_NAME }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: ${{ matrix.python_arch }}

      - name: Install system dependencies
        run: brew install create-dmg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Update version in config.py
        run: |
          sed -i '' 's/^\([[:space:]]*\)appVersion = ".*"/\1appVersion = "'"$VERSION"'"/' app/common/config.py

      - name: Compile Qt resources
        run: pyside6-rcc app/resources/resources.qrc -o app/resources/resources_rc.py

      - name: Build with Nuitka
        run: python scripts/deploy.py
        timeout-minutes: 120

      - name: Post-build fixups
        run: |
          APP_BUNDLE=$(find dist -maxdepth 2 -name "*.app" -type d | head -1)
          if [ -n "$APP_BUNDLE" ]; then
            chmod +x "$APP_BUNDLE/Contents/MacOS/"*
            rm -rf "dist/main.build" 2>/dev/null || true
            rm -rf "dist/main.dist" 2>/dev/null || true
          fi

      - name: Package .dmg
        run: |
          # Locate the .app bundle created by Nuitka
          APP_BUNDLE=$(find dist -maxdepth 2 -name "*.app" -type d | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "ERROR: No .app bundle found in dist/"
            exit 1
          fi
          echo "Found app bundle: $APP_BUNDLE"
          APP_NAME=$(basename "$APP_BUNDLE" .app)

          create-dmg \
            --volname "River Installer" \
            --window-pos 400 200 \
            --window-size 660 400 \
            --icon-size 80 \
            --icon "${APP_NAME}.app" 160 160 \
            --hide-extension "${APP_NAME}.app" \
            --app-drop-link 500 160 \
            "River_${{ env.VERSION_NAME }}_macos_${{ matrix.arch }}.dmg" \
            "${APP_BUNDLE}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-artifact
          path: River_${{ env.VERSION_NAME }}_macos_${{ matrix.arch }}.dmg

  # ── Publish ───────────────────────────────────────────────────────────────
  # Only runs on tag push (not workflow_dispatch) to create a GitHub Release.
  publish:
    if: github.event_name != 'workflow_dispatch'
    needs: [windows-build, linux-build, macos-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write
    env:
      VERSION_NAME: ${{ needs.windows-build.outputs.VERSION_NAME }}
      IS_PRERELEASE: ${{ needs.windows-build.outputs.IS_PRERELEASE }}
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*"
          path: release-artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: v${{ env.VERSION_NAME }}
          make_latest: ${{ env.IS_PRERELEASE != 'true' }}
          draft: false
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
          generate_release_notes: true
          files: |
            release-artifacts/*
